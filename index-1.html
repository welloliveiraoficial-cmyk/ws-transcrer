<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ws Transcrer — transcreva áudio e vídeo</title>
<meta name="color-scheme" content="dark">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#090e1a">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    color-scheme: dark;
    --bg: #090e1a;
    --panel: #111a2c;
    --panel-2: #16233c;
    --blue: #3f90ef;
    --blue-dim: #1f4d84;
    --cyan: #5eead4;
    --ink: #eef3fb;
    --ink-dim: #93a6c7;
    --muted: #57668a;
    --line: #223154;
    --danger: #ff7a72;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    position: relative;
  }
  ::selection{ background: var(--blue); color: #ffffff; }

  a { color: var(--cyan); }

  /* ---------- Fundo ambiente ---------- */
  .blob{
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    z-index: 0;
    pointer-events: none;
    opacity: .28;
    animation: blobDrift 16s ease-in-out infinite;
  }
  .blob-a{
    width: 420px; height: 420px;
    top: -140px; left: -120px;
    background: var(--blue);
  }
  .blob-b{
    width: 380px; height: 380px;
    bottom: -160px; right: -100px;
    background: var(--cyan);
    animation-delay: -8s;
    animation-duration: 19s;
  }
  @keyframes blobDrift{
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(36px,-26px) scale(1.1); }
  }
  @media (prefers-reduced-motion: reduce){ .blob{ animation: none; } }

  .wrap{
    max-width: 760px;
    margin: 0 auto;
    padding: 56px 24px 100px;
    position: relative;
    z-index: 1;
  }

  @keyframes fadeInUp{
    from{ opacity: 0; transform: translateY(16px); }
    to{ opacity: 1; transform: translateY(0); }
  }
  .wrap.revealed .hero{ animation: fadeInUp .6s ease both; }
  .wrap.revealed .panel{ animation: fadeInUp .6s ease both; }
  .wrap.revealed .panel:nth-of-type(1){ animation-delay: .08s; }
  .wrap.revealed .panel:nth-of-type(2){ animation-delay: .16s; }
  .wrap.revealed .panel:nth-of-type(3){ animation-delay: .24s; }
  .wrap.revealed footer{ animation: fadeInUp .6s ease .32s both; }
  @media (prefers-reduced-motion: reduce){
    .wrap.revealed .hero, .wrap.revealed .panel, .wrap.revealed footer{ animation: none; }
  }

  /* ---------- Hero ---------- */
  .hero{
    display:flex;
    align-items:center;
    gap: 20px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }
  .reel{
    width: 58px; height: 58px;
    flex: none;
    position: relative;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 0 0 1px rgba(63,144,239,0.35), 0 8px 24px -6px rgba(63,144,239,0.55);
  }
  .reel img{ width:100%; height:100%; display:block; object-fit: cover; }

  h1.logo{
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 28px;
    letter-spacing: -0.01em;
    margin: 0;
    color: var(--ink);
  }
  h1.logo span{
    background: linear-gradient(90deg, var(--blue), var(--cyan));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .tagline{
    color: var(--ink-dim);
    font-size: 15px;
    margin: 4px 0 0;
  }

  /* Onda ambiente — elemento assinatura */
  .ambient-wave{
    display:flex;
    align-items:center;
    gap: 3px;
    height: 20px;
    margin-top: 10px;
    flex: 0 0 100%;
  }
  .ambient-wave .bar{
    width: 3px;
    border-radius: 2px;
    background: linear-gradient(180deg, var(--cyan), var(--blue));
    animation: ambientBounce 2.4s ease-in-out infinite;
    opacity: .75;
  }
  @keyframes ambientBounce{
    0%, 100% { height: 4px; }
    50% { height: 18px; }
  }
  @media (prefers-reduced-motion: reduce){
    .ambient-wave .bar{ animation: none; height: 9px; }
  }

  .hero-actions{
    margin-left: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: none;
  }
  .pill-btn{
    display: none;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px solid var(--blue-dim);
    color: var(--blue);
    border-radius: 999px;
    padding: 8px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background .15s ease, transform .1s ease;
  }
  .pill-btn:hover{ background: rgba(63,144,239,0.12); }
  .pill-btn:active{ transform: scale(0.98); }
  .pill-btn.show{ display: inline-flex; }
  .pill-btn.update{
    border-color: var(--cyan);
    color: var(--cyan);
    background: rgba(94,234,212,0.1);
  }
  .pill-btn .dot{
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--cyan);
    flex: none;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{ opacity: .4; } 50%{ opacity: 1; } }
  @media (prefers-reduced-motion: reduce){ .pill-btn .dot{ animation: none; } }

  @media (max-width: 480px){
    .hero-actions{ margin-left: 0; flex-direction: row; width: 100%; order: 3; }
  }

  .eyebrow{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--blue);
    margin: 0 0 10px;
  }

  /* ---------- Panels ---------- */
  .panel{
    background: linear-gradient(180deg, var(--panel), var(--panel) 60%, #0e1728);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 22px;
    margin-bottom: 18px;
    transition: border-color .2s ease, box-shadow .2s ease;
  }
  .panel:focus-within, .panel:hover{
    border-color: var(--blue-dim);
    box-shadow: 0 0 0 1px rgba(63,144,239,0.15), 0 10px 30px -14px rgba(63,144,239,0.35);
  }

  label{
    display:block;
    font-size: 13px;
    color: var(--ink-dim);
    margin-bottom: 8px;
  }
  input[type="password"], input[type="text"]{
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 11px 12px;
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  input[type="password"]:focus, input[type="text"]:focus{
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(63,144,239,0.18);
  }
  .hint{
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.5;
  }

  /* ---------- Dropzone ---------- */
  .drop{
    display: block;
    border: 1.5px dashed var(--line);
    border-radius: var(--radius);
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color .18s ease, background .18s ease, transform .12s ease;
  }
  .drop:hover, .drop.drag{
    border-color: var(--cyan);
    background: rgba(94,234,212,0.06);
    transform: translateY(-1px);
  }
  .drop:focus-visible{
    outline: 2px solid var(--blue);
    outline-offset: 2px;
  }
  .drop .icon{ color: var(--blue); margin-bottom: 10px; }
  .drop .icon svg{ animation: floatIcon 2.6s ease-in-out infinite; }
  @keyframes floatIcon{ 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(-4px);} }
  @media (prefers-reduced-motion: reduce){ .drop .icon svg{ animation: none; } }
  .drop .main{ font-size: 14.5px; color: var(--ink); }
  .drop .sub{ font-size: 12.5px; color: var(--muted); margin-top: 6px; }
  input[type="file"]{ display:none; }

  .file-chip{
    display:flex;
    align-items:center;
    justify-content: space-between;
    gap: 12px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 13px;
    animation: fadeInUp .35s ease both;
  }
  .file-chip .name{
    font-family: 'JetBrains Mono', monospace;
    color: var(--ink);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .file-chip .size{ color: var(--muted); flex: none; }
  .file-chip button{
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 18px; line-height: 1; padding: 0 2px;
  }
  .file-chip button:hover{ color: var(--danger); }

  /* ---------- Button ---------- */
  .btn{
    position: relative;
    overflow: hidden;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    background: linear-gradient(135deg, var(--blue), #2f6fd8 55%, var(--cyan));
    color: #ffffff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 13px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 13.5px;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: filter .15s ease, transform .1s ease, box-shadow .15s ease;
    box-shadow: 0 8px 22px -10px rgba(63,144,239,0.7);
  }
  .btn::after{
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(115deg, transparent 30%, rgba(255,255,255,0.35) 50%, transparent 70%);
    background-size: 220% 100%;
    background-position: 130% 0;
    transition: background-position .6s ease;
  }
  .btn:hover:not(:disabled)::after{ background-position: -30% 0; }
  .btn:hover:not(:disabled){ filter: brightness(1.06); transform: translateY(-1px); }
  .btn:active:not(:disabled){ transform: scale(0.99); }
  .btn:disabled{ background: var(--panel-2); color: var(--muted); cursor: not-allowed; box-shadow: none; }
  .btn:disabled::after{ display:none; }

  .btn-ghost{
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink-dim);
    box-shadow: none;
  }
  .btn-ghost::after{ display:none; }
  .btn-ghost:hover:not(:disabled){ border-color: var(--blue-dim); color: var(--ink); filter:none; transform:none; }

  /* ---------- Waveform (processing indicator) ---------- */
  .waveform{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 4px;
    height: 40px;
    margin: 4px 0 2px;
  }
  .waveform .bar{
    width: 3px;
    background: linear-gradient(180deg, var(--cyan), var(--blue));
    border-radius: 2px;
    animation: bounce 1.1s ease-in-out infinite;
    filter: drop-shadow(0 0 6px rgba(94,234,212,0.5));
  }
  @keyframes bounce{
    0%, 100% { height: 6px; opacity: .5; }
    50% { height: 30px; opacity: 1; }
  }
  @media (prefers-reduced-motion: reduce){
    .waveform .bar{ animation: none; height: 18px; opacity: .8; }
  }
  .status-text{
    text-align:center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--cyan);
    letter-spacing: 0.04em;
  }

  /* ---------- Transcript ---------- */
  .transcript{
    white-space: pre-wrap;
    font-size: 14.5px;
    line-height: 1.75;
    color: var(--ink);
    max-height: 480px;
    overflow-y: auto;
    padding-right: 4px;
    animation: fadeInUp .5s ease both;
  }
  .transcript::-webkit-scrollbar{ width: 6px; }
  .transcript::-webkit-scrollbar-thumb{ background: var(--line); border-radius: 3px; }

  .result-actions{
    display:flex;
    gap: 10px;
    margin-top: 16px;
  }
  .result-actions .btn{ width: auto; padding: 9px 14px; font-size: 12.5px; }

  .error-box{
    background: rgba(255,122,114,0.1);
    border: 1px solid rgba(255,122,114,0.35);
    color: #ffb3ac;
    border-radius: var(--radius-sm);
    padding: 13px 14px;
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 18px;
    animation: fadeInUp .35s ease both;
  }

  footer{
    text-align:center;
    color: var(--muted);
    font-size: 12px;
    margin-top: 40px;
    line-height: 1.6;
    position: relative;
    z-index: 1;
  }

  .visually-hidden{
    position:absolute; width:1px; height:1px; overflow:hidden;
    clip: rect(0,0,0,0); white-space:nowrap;
  }

  /* ---------- Splash ---------- */
  #splash{
    position: fixed;
    inset: 0;
    z-index: 999;
    background: radial-gradient(circle at 50% 42%, #101d36 0%, var(--bg) 70%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    transition: opacity .5s ease, transform .5s ease;
  }
  #splash.hide{ opacity: 0; transform: scale(1.03); pointer-events: none; }
  #splash .reel-wrap{
    position: relative;
    width: 96px; height: 96px;
    display:flex; align-items:center; justify-content:center;
  }
  #splash .ring{
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1.5px solid var(--cyan);
    animation: ringPulse 2s ease-out infinite;
  }
  #splash .ring.delay{ animation-delay: 1s; }
  @keyframes ringPulse{
    0%{ transform: scale(.75); opacity: .6; }
    100%{ transform: scale(1.5); opacity: 0; }
  }
  #splash .reel{
    width: 76px; height: 76px;
    border-radius: 18px;
    box-shadow: 0 0 0 1px rgba(63,144,239,0.4), 0 0 40px -4px rgba(63,144,239,0.6);
    animation: splashLogoIn .7s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes splashLogoIn{
    from{ opacity: 0; transform: scale(.8); }
    to{ opacity: 1; transform: scale(1); }
  }
  #splash .splash-name{
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 23px;
    letter-spacing: -0.01em;
    color: var(--ink);
    animation: fadeInUp .6s ease .15s both;
  }
  #splash .splash-name span{
    background: linear-gradient(90deg, var(--blue), var(--cyan));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  @media (prefers-reduced-motion: reduce){
    #splash .ring{ animation: none; opacity: 0; }
    #splash .reel{ animation: none; }
    #splash .splash-name{ animation: none; }
    #splash{ transition: opacity .3s ease; }
    #splash.hide{ transform: none; }
  }
</style>
</head>
<body>

<div id="splash" aria-hidden="true">
  <div class="reel-wrap">
    <div class="ring"></div>
    <div class="ring delay"></div>
    <div class="reel">
      <img src="logo.png" alt="" width="76" height="76">
    </div>
  </div>
  <div class="splash-name">Ws <span>Transcrer</span></div>
</div>

<div class="blob blob-a" aria-hidden="true"></div>
<div class="blob blob-b" aria-hidden="true"></div>

<div class="wrap" id="wrap">

  <div class="hero">
    <div class="reel" aria-hidden="true">
      <img src="logo.png" alt="" width="58" height="58">
    </div>
    <div>
      <h1 class="logo">Ws <span>Transcrer</span></h1>
      <p class="tagline">Solte um áudio ou vídeo. Sai transcrito, em qualquer idioma.</p>
    </div>
    <div class="hero-actions">
      <button id="installBtn" class="pill-btn" type="button">⬇ Instalar app</button>
      <button id="updateBtn" class="pill-btn update" type="button"><span class="dot" aria-hidden="true"></span> Atualizar app</button>
    </div>
    <div class="ambient-wave" aria-hidden="true">
      <div class="bar" style="animation-delay:0s"></div>
      <div class="bar" style="animation-delay:.15s"></div>
      <div class="bar" style="animation-delay:.3s"></div>
      <div class="bar" style="animation-delay:.45s"></div>
      <div class="bar" style="animation-delay:.1s"></div>
      <div class="bar" style="animation-delay:.35s"></div>
      <div class="bar" style="animation-delay:.2s"></div>
      <div class="bar" style="animation-delay:.5s"></div>
      <div class="bar" style="animation-delay:.05s"></div>
      <div class="bar" style="animation-delay:.4s"></div>
      <div class="bar" style="animation-delay:.25s"></div>
      <div class="bar" style="animation-delay:.55s"></div>
    </div>
  </div>

  <div id="error" class="error-box" style="display:none;" role="alert"></div>

  <!-- Upload -->
  <div class="panel">
    <p class="eyebrow">01 · Arquivo</p>

    <label id="dropzone" class="drop" for="fileInput" aria-label="Selecionar arquivo de áudio ou vídeo">
      <div class="icon" aria-hidden="true">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" style="margin:0 auto;">
          <path d="M12 3v12m0-12 4 4m-4-4-4 4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" stroke="#2f83d6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="main">Arraste um arquivo aqui, ou clique para escolher</div>
      <div class="sub">Áudio ou vídeo · até 4&nbsp;MB</div>
    </label>
    <input type="file" id="fileInput" accept="audio/*,video/*" />

    <div id="fileChipWrap" style="display:none; margin-top:14px;">
      <div class="file-chip">
        <span class="name" id="fileName"></span>
        <span class="size" id="fileSize"></span>
        <button id="removeFile" aria-label="Remover arquivo" type="button">×</button>
      </div>
    </div>
  </div>

  <!-- Transcrever -->
  <div class="panel">
    <p class="eyebrow">02 · Transcrição</p>
    <button id="transcribeBtn" class="btn" disabled>Transcrever</button>

    <div id="processing" style="display:none; margin-top:18px;">
      <div class="waveform" aria-hidden="true">
        <div class="bar" style="animation-delay:0s"></div>
        <div class="bar" style="animation-delay:.1s"></div>
        <div class="bar" style="animation-delay:.2s"></div>
        <div class="bar" style="animation-delay:.3s"></div>
        <div class="bar" style="animation-delay:.15s"></div>
        <div class="bar" style="animation-delay:.05s"></div>
        <div class="bar" style="animation-delay:.25s"></div>
      </div>
      <p class="status-text" id="statusText">ouvindo o áudio...</p>
    </div>
  </div>

  <!-- Resultado -->
  <div class="panel" id="resultPanel" style="display:none;">
    <p class="eyebrow">Transcrição</p>
    <div class="transcript" id="transcriptText"></div>
    <div class="result-actions">
      <button class="btn btn-ghost" id="copyBtn" type="button">Copiar texto</button>
      <button class="btn btn-ghost" id="downloadBtn" type="button">Baixar .txt</button>
    </div>
  </div>

  <footer>
    O arquivo vai direto do seu navegador para os servidores do Google (Gemini). A chave de API fica só no nosso servidor — nunca é exposta no app.
  </footer>

</div>

<script>
(function(){
  // ---------- Splash ----------
  const splash = document.getElementById('splash');
  const wrap = document.getElementById('wrap');
  window.addEventListener('load', () => {
    setTimeout(() => {
      splash.classList.add('hide');
      wrap.classList.add('revealed');
      setTimeout(() => { splash.style.display = 'none'; }, 550);
    }, 1100);
  });

  // ---------- Notificações ----------
  // Mostra uma notificação com a logo do app. Funciona mesmo com o app em
  // segundo plano (usa o service worker quando disponível, que é o jeito
  // mais confiável no Android).
  function notificar(titulo, corpo){
    if(!('Notification' in window) || Notification.permission !== 'granted') return;

    const opcoes = {
      body: corpo,
      icon: 'icon-192.png',
      badge: 'badge.png'
    };

    if('serviceWorker' in navigator){
      navigator.serviceWorker.ready.then((reg) => reg.showNotification(titulo, opcoes)).catch(() => {});
    } else {
      try{ new Notification(titulo, opcoes); }catch(e){}
    }
  }

  // Pede permissão de notificação na primeira vez que o usuário tenta
  // transcrever — precisa ser dentro de uma ação do usuário (clique).
  let permissaoJaPedida = false;
  function pedirPermissaoNotificacao(){
    if(permissaoJaPedida) return;
    permissaoJaPedida = true;
    if('Notification' in window && Notification.permission === 'default'){
      Notification.requestPermission();
    }
  }

  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const fileChipWrap = document.getElementById('fileChipWrap');
  const fileNameEl = document.getElementById('fileName');
  const fileSizeEl = document.getElementById('fileSize');
  const removeFileBtn = document.getElementById('removeFile');
  const transcribeBtn = document.getElementById('transcribeBtn');
  const processingEl = document.getElementById('processing');
  const statusText = document.getElementById('statusText');
  const resultPanel = document.getElementById('resultPanel');
  const transcriptText = document.getElementById('transcriptText');
  const copyBtn = document.getElementById('copyBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const errorBox = document.getElementById('error');

  const MAX_BYTES = 4 * 1024 * 1024; // 4 MB — limite prático da função serverless (chave escondida)
  let selectedFile = null;

  function showError(msg){
    errorBox.textContent = msg;
    errorBox.style.display = 'block';
    errorBox.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }
  function clearError(){
    errorBox.style.display = 'none';
    errorBox.textContent = '';
  }

  function formatSize(bytes){
    if(bytes < 1024*1024) return (bytes/1024).toFixed(0) + ' KB';
    return (bytes/(1024*1024)).toFixed(1) + ' MB';
  }

  function updateTranscribeState(){
    transcribeBtn.disabled = !selectedFile;
  }

  function setFile(file){
    if(!file) return;
    if(!file.type.startsWith('audio/') && !file.type.startsWith('video/')){
      showError('Escolha um arquivo de áudio ou vídeo.');
      return;
    }
    if(file.size > MAX_BYTES){
      showError('Esse arquivo tem ' + formatSize(file.size) + '. O Ws Transcrer aceita até 4 MB por enquanto. Tente um trecho mais curto, ou extraia só o áudio do vídeo antes de enviar.');
      return;
    }
    clearError();
    selectedFile = file;
    fileNameEl.textContent = file.name;
    fileSizeEl.textContent = formatSize(file.size);
    fileChipWrap.style.display = 'block';
    resultPanel.style.display = 'none';
    updateTranscribeState();
  }

  fileInput.addEventListener('change', (e) => setFile(e.target.files[0]));

  ['dragenter','dragover'].forEach(evt => {
    dropzone.addEventListener(evt, (e) => { e.preventDefault(); dropzone.classList.add('drag'); });
  });
  ['dragleave','drop'].forEach(evt => {
    dropzone.addEventListener(evt, (e) => { e.preventDefault(); dropzone.classList.remove('drag'); });
  });
  dropzone.addEventListener('drop', (e) => {
    const file = e.dataTransfer.files[0];
    setFile(file);
  });

  removeFileBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    selectedFile = null;
    fileInput.value = '';
    fileChipWrap.style.display = 'none';
    updateTranscribeState();
  });

  function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

  // Upload em etapas: pede ao nosso backend pra abrir a sessão (ele usa a
  // chave secreta), depois envia os bytes do arquivo direto pro Google
  // (sem passar pela nossa função, sem limite de tamanho por causa disso).
  function fileToBase64(file){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = () => reject(new Error('Não foi possível ler o arquivo.'));
      reader.readAsDataURL(file);
    });
  }

  const statusMessages = ['enviando o arquivo...', 'ouvindo o áudio...', 'identificando o idioma...', 'escrevendo o texto...'];

  // Pede a transcrição ao nosso backend (que guarda a chave em segredo).
  // O arquivo vai em base64 dentro do corpo da requisição — o Google não
  // permite que o navegador envie arquivos direto pra URL de upload dele
  // (bloqueio de CORS), então o arquivo precisa passar pelo nosso servidor.
  async function transcreverViaBackend(file, onRetry){
    const base64Data = await fileToBase64(file);

    const MAX_TENTATIVAS = 4;
    const ESPERA_MS = 5000;

    for(let tentativa = 1; tentativa <= MAX_TENTATIVAS; tentativa++){
      let resp;
      try{
        resp = await fetch('/.netlify/functions/transcribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mimeType: file.type, base64Data })
        });
      }catch(e){
        throw new Error('[etapa: enviar-transcricao] ' + (e.message || 'falha de rede'));
      }
      const data = await resp.json();

      if(resp.ok) return data.text;

      const sobrecarregado = resp.status === 503 || data.error === 'servidor_sobrecarregado';

      if(sobrecarregado && tentativa < MAX_TENTATIVAS){
        if(onRetry) onRetry(tentativa, MAX_TENTATIVAS);
        await sleep(ESPERA_MS);
        continue;
      }

      throw new Error(sobrecarregado ? 'O servidor do Google está sobrecarregado no momento. Tente novamente em alguns minutos.' : (data.error || 'Erro desconhecido.'));
    }
  }

  transcribeBtn.addEventListener('click', async () => {
    if(!selectedFile) return;

    pedirPermissaoNotificacao();

    clearError();
    resultPanel.style.display = 'none';
    transcribeBtn.disabled = true;
    processingEl.style.display = 'block';

    let msgIndex = 0;
    let emRetry = false;
    statusText.textContent = statusMessages[0];
    const statusInterval = setInterval(() => {
      if(emRetry) return;
      msgIndex = (msgIndex + 1) % statusMessages.length;
      statusText.textContent = statusMessages[msgIndex];
    }, 2800);

    try{
      const text = await transcreverViaBackend(selectedFile, (tentativa, total) => {
        emRetry = true;
        statusText.textContent = 'servidor ocupado, tentando de novo (' + tentativa + '/' + (total - 1) + ')...';
        setTimeout(() => { emRetry = false; }, 4700);
      });

      transcriptText.textContent = text;
      resultPanel.style.display = 'block';
      resultPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      notificar('Transcrição concluída ✅', selectedFile ? selectedFile.name : 'Seu áudio/vídeo foi transcrito.');

    } catch(err){
      let msg = err.message || 'Falha ao transcrever.';
      const etapaMatch = msg.match(/^\[etapa: ([^\]]+)\]\s*/);
      const etapa = etapaMatch ? etapaMatch[1] : null;
      const lowerMsg = msg.toLowerCase();
      if(lowerMsg.includes('failed to fetch') || lowerMsg.includes('networkerror')){
        msg = 'Falha de conexão ao enviar o arquivo. Verifique sua internet e tente de novo.';
      } else if(lowerMsg.includes('chave de api')){
        msg = 'O servidor deste app ainda não foi configurado com a chave de API. Avise quem administra o Ws Transcrer.';
      }
      if(etapa){
        msg += ' (etapa: ' + etapa + ')';
      }
      showError(msg);
      notificar('Falha na transcrição ⚠️', msg);
    } finally {
      clearInterval(statusInterval);
      processingEl.style.display = 'none';
      transcribeBtn.disabled = false;
    }
  });

  copyBtn.addEventListener('click', async () => {
    try{
      await navigator.clipboard.writeText(transcriptText.textContent);
      const original = copyBtn.textContent;
      copyBtn.textContent = 'Copiado ✓';
      setTimeout(() => { copyBtn.textContent = original; }, 1600);
    }catch(e){
      showError('Não foi possível copiar automaticamente. Selecione o texto manualmente.');
    }
  });

  downloadBtn.addEventListener('click', () => {
    const blob = new Blob([transcriptText.textContent], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const base = (selectedFile ? selectedFile.name.replace(/\.[^.]+$/, '') : 'transcricao');
    a.href = url;
    a.download = base + '.txt';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  // ---------- Instalar app (PWA) ----------
  const installBtn = document.getElementById('installBtn');
  let deferredInstallPrompt = null;

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredInstallPrompt = e;
    installBtn.classList.add('show');
  });

  installBtn.addEventListener('click', async () => {
    if(!deferredInstallPrompt) return;
    installBtn.disabled = true;
    deferredInstallPrompt.prompt();
    const { outcome } = await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    installBtn.disabled = false;
    if(outcome === 'accepted'){
      installBtn.classList.remove('show');
    }
  });

  window.addEventListener('appinstalled', () => {
    installBtn.classList.remove('show');
    deferredInstallPrompt = null;
  });

  // ---------- Service worker + botão de atualização ----------
  const updateBtn = document.getElementById('updateBtn');
  let waitingWorker = null;

  function showUpdateButton(worker){
    waitingWorker = worker;
    updateBtn.classList.add('show');
    notificar('Nova versão disponível 🔄', 'Toque em "Atualizar app" no Ws Transcrer para atualizar.');
  }

  updateBtn.addEventListener('click', () => {
    if(!waitingWorker) return;
    updateBtn.disabled = true;
    waitingWorker.postMessage({ type: 'SKIP_WAITING' });
  });

  if('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').then((registration) => {

        // Já existe uma versão nova esperando (ex: usuário abriu o app
        // de novo depois de um deploy anterior).
        if(registration.waiting){
          showUpdateButton(registration.waiting);
        }

        // Uma versão nova terminou de baixar agora, enquanto o app estava aberto.
        registration.addEventListener('updatefound', () => {
          const newWorker = registration.installing;
          if(!newWorker) return;
          newWorker.addEventListener('statechange', () => {
            if(newWorker.state === 'installed' && navigator.serviceWorker.controller){
              showUpdateButton(newWorker);
            }
          });
        });

        // Verifica se há atualização toda vez que o app volta a ficar visível.
        document.addEventListener('visibilitychange', () => {
          if(document.visibilityState === 'visible'){
            registration.update();
          }
        });
      }).catch(() => { /* app continua funcionando normalmente sem o service worker */ });

      // Quando a nova versão assume o controle, recarrega a página uma vez.
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if(refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    });
  }
})();
</script>

</body>
</html>
